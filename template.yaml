AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    Timeout: 30

Resources:
  OtelEsmFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: .
      Environment:
        Variables:
          NODE_OPTIONS: '--import ./setup.mjs'

  OtelCjsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index-cjs.handler
      CodeUri: .
      Environment:
        Variables:
          NODE_OPTIONS: '--import ./setup.mjs'
